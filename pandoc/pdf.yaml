from: markdown+fenced_code_blocks+pipe_tables+task_lists
to: pdf

pdf-engine: xelatex

filters:
  - pandoc/filters/diagram.lua
  - pandoc/filters/pagebreak.lua

metadata:
  diagram:
    cache: true

toc: true
toc-depth: 3
number-sections: true

highlight-style: pygments

variables:
  geometry: margin=1in
  fontsize: 11pt
  mainfont: DejaVu Sans
  sansfont: DejaVu Sans
  monofont: DejaVu Sans Mono
  colorlinks: true
  linkcolor: blue
  urlcolor: blue

wrap: none